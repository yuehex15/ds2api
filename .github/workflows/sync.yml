name: Sync Fork Automatically

on:
  schedule:
    - cron: '0 20 * * *'          # 每天 UTC 20:00 运行
  workflow_dispatch:               # 允许手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 如果不在此处配置 token，后续推送将使用 GITHUB_TOKEN，可能受限制。
          # 我们会在后续步骤中手动替换 remote 为 PAT，所以这里可保留默认。

      - name: Detect upstream and fork information
        id: repo-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # 获取 fork 自身信息以及上游仓库信息
          repo_json=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$REPO)

          upstream_url=$(echo "$repo_json" | jq -r '.parent.clone_url')
          upstream_branch=$(echo "$repo_json" | jq -r '.parent.default_branch')
          fork_branch=$(echo "$repo_json" | jq -r '.default_branch')

          # 检查上游是否存在
          if [ "$upstream_url" = "null" ] || [ -z "$upstream_url" ]; then
            echo "::warning::未检测到上游仓库（parent），可能不是 fork 或上游已删除，跳过同步。"
            echo "upstream_exists=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "upstream_exists=true" >> $GITHUB_OUTPUT
          echo "upstream_url=$upstream_url" >> $GITHUB_OUTPUT
          echo "upstream_branch=$upstream_branch" >> $GITHUB_OUTPUT
          echo "fork_branch=$fork_branch" >> $GITHUB_OUTPUT

          echo "检测到上游仓库: $upstream_url"
          echo "上游默认分支: $upstream_branch"
          echo "本仓库默认分支: $fork_branch"

      - name: Add upstream remote
        if: steps.repo-info.outputs.upstream_exists == 'true'
        run: |
          # 如果已存在 upstream 远程则先删除，避免报错
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "${{ steps.repo-info.outputs.upstream_url }}"
          git remote -v

      - name: Fetch upstream
        if: steps.repo-info.outputs.upstream_exists == 'true'
        run: git fetch upstream

      - name: Sync fork with upstream
        if: steps.repo-info.outputs.upstream_exists == 'true'
        run: |
          git checkout "${{ steps.repo-info.outputs.fork_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 合并上游分支，若发生冲突则报错并退出，需要人工处理
          set -e
          git merge "upstream/${{ steps.repo-info.outputs.upstream_branch }}" --no-edit
          echo "成功合并上游分支。"
        shell: bash

      - name: Push changes
        if: steps.repo-info.outputs.upstream_exists == 'true'
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          # 使用 Personal Access Token 推送，以绕过 GITHUB_TOKEN 不能修改工作流文件的限制
          if [ -z "$SYNC_TOKEN" ]; then
            echo "::error::未找到 SYNC_TOKEN 机密，请先创建具有 workflow 权限的 PAT 并存入 Secrets。"
            exit 1
          fi

          # 用 PAT 替换 origin 的 URL
          git remote set-url origin "https://x-access-token:${SYNC_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "${{ steps.repo-info.outputs.fork_branch }}"
          echo "推送完成。"
